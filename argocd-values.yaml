## ArgoCD v3.3.4 Helm chart values (chart 9.4.12)
## Chart: argo/argo-cd

global:
  logging:
    format: "json"
    level: "info"

## Application Controller
controller:
  logLevel: "debug"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: "k8s"

## API Server
server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: "k8s"

## Repo Server
repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: "k8s"

## ApplicationSet Controller
applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: "k8s"

## Disable unused components
notifications:
  enabled: false

dex:
  enabled: false
