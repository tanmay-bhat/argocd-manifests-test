apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bulk-app-1
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/tanmay-bhat/argocd-manifests-test'
    targetRevision: HEAD
    path: bulk-resources
    helm:
      releaseName: bulk-app-1
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: bulk-app-1-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
