apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config-name: {{ .Values.config.name | quote }}
  environment: {{ .Values.environment | quote }}
  region: {{ .Values.region | quote }}
